<!-- Meta Descrizione e SEO per Crawler -->
{{- $description := .Description | default .Summary | plainify | truncate 160 -}}
{{- if not $description -}}
    {{- $description = .Site.Params.description -}}
{{- end -}}
<meta name="description" content="{{ $description }}">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:title" content="{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}">
<meta property="og:description" content="{{ $description }}">
<meta property="og:site_name" content="{{ .Site.Title }}">

<!-- Cookie Consent -->
<!-- <link rel="stylesheet" href="/cookieconsent.css"> -->
<link rel="preload" href="/cookieconsent.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="/cookieconsent.css"></noscript>

<style>
    /* Personalizzazione per adattarlo allo stile RPG del blog */
    #cc-main {
        /* Usa le variabili del tema del blog */
        --cc-bg: var(--theme, #fff);
        --cc-primary-color: var(--secondary, #2d4156);
        --cc-secondary-color: var(--content, #555);
        
        --cc-btn-primary-bg: var(--secondary, #333); 
        --cc-btn-primary-text: var(--theme, #fff);
        --cc-btn-primary-hover-bg: var(--tertiary, #000);

        --cc-btn-secondary-bg: var(--tertiary, #eee);
        --cc-btn-secondary-text: var(--secondary, #333);
        --cc-btn-secondary-hover-bg: var(--border, #ddd);
        
        /* Stile RPG: angoli netti o poco arrotondati */
        --cc-modal-border-radius: 0px;
        --cc-btn-border-radius: 2px;
        --cc-separator-border-color: var(--border, #eee);
        --cc-footer-bg: var(--tertiary, #f9f9f9);

        /* Forza lo z-index per essere sicuri che sia sopra il widget meteo */
        z-index: 9999999 !important;
    }

    /* Supporto per il tema scuro se il blog usa la classe .dark sul body */
    .dark #cc-main {
        --cc-bg: var(--theme, #1a1a1a);
        --cc-primary-color: var(--secondary, #eee);
        --cc-footer-bg: #252525;
    }
</style>

<!-- Caricamento Libreria Cookie Consent v3 -->
<script src="/cookieconsent.umd.js" defer></script>

<script>
    /** Inizializza dataLayer per GTM */
    window.dataLayer = window.dataLayer || [];

    /** Attendi che il DOM sia pronto */
    document.addEventListener('DOMContentLoaded', function(){
        console.log("CookieConsent: Tentativo di inizializzazione...");
        
        /** Verifica se l'oggetto CookieConsent è definito (evita ReferenceError) */
        if (typeof CookieConsent === 'undefined') {
            console.error("CookieConsent: La libreria non è stata caricata (possibile errore di sintassi nel file JS).");
            return;
        }

        try {
            CookieConsent.run({
                guiOptions: {
                    consentModal: {
                        layout: 'box',
                        position: 'bottom right',
                        equalWeightButtons: true
                    },
                    preferencesModal: {
                        layout: 'box',
                        position: 'right',
                        equalWeightButtons: true
                    }
                },
                categories: {
                    necessary: {
                        enabled: true,
                        readOnly: true
                    },
                    analytics: {
                        enabled: false,
                        readOnly: false
                    }
                },
                language: {
                    default: 'it',
                    translations: {
                        it: {
                            consentModal: {
                                title: 'Consenso Cookie',
                                description: 'Utilizziamo i cookie per migliorare l\'esperienza e analizzare il traffico del blog. Per maggiori informazioni, consulta la nostra <a href="/privacy-policy/" target="_blank">Privacy Policy</a>.',
                                acceptAllBtn: 'Accetta tutti',
                                acceptNecessaryBtn: 'Rifiuta tutti',
                                showPreferencesBtn: 'Gestisci preferenze'
                            },
                            preferencesModal: {
                                title: 'Preferenze Cookie',
                                savePreferencesBtn: 'Salva impostazioni',
                                acceptAllBtn: 'Accetta tutti',
                                acceptNecessaryBtn: 'Rifiuta tutti',
                                closeIconLabel: 'Chiudi',
                                sections: [
                                    {
                                        title: 'Cookie tecnici',
                                        description: 'Questi cookie sono necessari per il funzionamento del sito.'
                                    },
                                    {
                                        title: 'Cookie analitici',
                                        description: 'Ci aiutano a capire come i visitatori interagiscono con il sito.',
                                        linkedCategory: 'analytics'
                                    }
                                ]
                            }
                        },
                    }
                }
            });
            console.log("CookieConsent: Configurazione caricata.");

            // Allega il gestore eventi al pulsante delle preferenze dopo che CookieConsent è inizializzato
            const preferencesBtn = document.getElementById('cc-preferences-btn');
            if (preferencesBtn) {
                preferencesBtn.addEventListener('click', function() {
                    CookieConsent.showPreferences();
                });
            }
        } catch (e) {
            console.error("CookieConsent: Errore durante l'esecuzione:", e);
        }
    });
</script>
<!-- End Cookie Consent -->
