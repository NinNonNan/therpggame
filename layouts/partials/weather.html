<div class="weather-rpg" id="weather-rpg" style="display: none;">
    <div style="display: flex; align-items: center; gap: 15px; padding: 15px; background: var(--code-bg); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 20px;">
        <span id="w-icon" style="font-size: 1.8em;">🌍</span>
        <div style="line-height: 1.2;">
            <div id="w-fase" style="font-weight: 800; text-transform: uppercase; font-size: 0.8em; color: var(--secondary);">CARICAMENTO...</div>
            <div id="w-desc" style="font-size: 0.9em; opacity: 0.8;">Sincronizzazione oracolo...</div>
        </div>
    </div>
</div>

<script>
    async function updateWeather() {
        try {
            const res = await fetch('https://meteo-therpggame.antonino-ragusa-er.workers.dev/'); // <--- METTI IL TUO URL QUI
            const d = await res.json();
            
            const icons = { "Sole forte": "☀️", "Cielo velato": "⛅", "Nebbia": "🌫️", "Pioggia": "🌧️", "Neve": "❄️", "Tempesta": "⛈️" };
            
            document.getElementById('w-icon').innerText = icons[d.meteo] || "🌍";
            document.getElementById('w-fase').innerText = d.fase;
            document.getElementById('w-desc').innerText = `${d.meteo} • ${d.temperatura} • Magia ${d.condizione_magica}`;
            document.getElementById('weather-rpg').style.display = 'block';
        } catch (e) { console.error("Meteo RPG offline"); }
    }
    updateWeather();
</script>
