<div class="weather-rpg" id="weather-rpg" style="min-height: 100px; max-width: var(--main-width); margin: 20px auto 10px auto; padding: 10px var(--gap); border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border);">
    <div style="display: flex; align-items: center; gap: 20px;">
        <span id="w-icon" style="font-size: 3.5em; line-height: 1;">🌍</span>        
        <div style="line-height: 1.4;">
            <div id="w-fase" style="font-weight: 900; text-transform: uppercase; font-size: 1.2em; color: var(--secondary); letter-spacing: 1px;">
                CARICAMENTO...
            </div>          
            <div id="w-desc" style="font-size: 1.1em; opacity: 0.9; font-style: italic;">
                Sincronizzazione oracolo in corso...
            </div>
        </div>
    </div>
</div>

<script>
    async function updateWeather() {
        const CACHE_KEY = 'rpg_weather_data';
        const CACHE_TIME = 'rpg_weather_expiry';
        const TTL = 15 * 60 * 1000; // 15 minuti di cache

        const renderWeather = (d) => {
            const icons = { "Sole forte": "☀️", "Cielo velato": "⛅", "Nebbia": "🌫️", "Pioggia": "🌧️", "Neve": "❄️", "Tempesta": "⛈️" };
            const container = document.getElementById('weather-rpg');
            
            document.getElementById('w-icon').innerText = icons[d.meteo] || "🌍";
            document.getElementById('w-fase').innerText = d.fase;
            document.getElementById('w-desc').innerText = `${d.meteo} • ${d.temperatura} • Magia ${d.condizione_magica}`;
        };

        // 1. Controlla Cache
        const cachedData = localStorage.getItem(CACHE_KEY);
        const cachedExpiry = localStorage.getItem(CACHE_TIME);

        if (cachedData && cachedExpiry && Date.now() < parseInt(cachedExpiry)) {
            renderWeather(JSON.parse(cachedData));
            return;
        }

        // 2. Se non c'è cache o è scaduta, scarica i dati
        try {
            const res = await fetch('https://meteo-therpggame.antonino-ragusa-er.workers.dev/');
            if (!res.ok) throw new Error();
            const d = await res.json();
            
            // Salva in cache
            localStorage.setItem(CACHE_KEY, JSON.stringify(d));
            localStorage.setItem(CACHE_TIME, (Date.now() + TTL).toString());
            
            renderWeather(d);
        } catch (e) { 
            console.warn("Meteo RPG offline o lento"); 
        }
    }

    // Esegui subito: se i dati sono in cache, appariranno istantaneamente senza sbalzi
    updateWeather();
</script>
